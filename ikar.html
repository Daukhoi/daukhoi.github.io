<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ikar 虚拟输入法优化版</title>
<style>
@font-face{
 font-family:Ikar-Regular;
 src:url("Ikar-Regular.ttf") format("truetype");
}
:root{
 --bg:#f5f7fb;
 --key:#fff;
 --shadow:#9ca3af;
 --panel:#d1d5db;
 --text:#1f2937;
}
*{
 box-sizing:border-box;
 margin:0;
 font-family:Ikar-Regular,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
body{
 height:100vh;
 display:flex;
 flex-direction:column;
 overflow:hidden;
 background:var(--bg);
}
.input-container{
 flex:1;
 display:flex;
 justify-content:center;
 align-items:center;
 padding:20px;
}
#main-input{
 width:min(800px,100%);
 height:50%;
 max-height:350px;
 padding:20px;
 font-size:18px;
 border:2px solid #e0e4ec;
 border-radius:12px;
 outline:none;
 resize:none;
 box-shadow:0 4px 12px #00000012;
}
#main-input:focus{border-color:#4a90e2}

.keyboard-container{
 background:var(--panel);
 padding:12px 8px 24px;
 box-shadow:0 -4px 10px #0002;
}
.keyboard-wrapper{
 max-width:950px;
 margin:auto;
 display:flex;
 flex-direction:column;
 gap:8px;
}
.keyboard-row{
 display:flex;
 gap:6px;
 justify-content:center;
}
.key{
 flex:1;
 max-width:75px;
 height:54px;
 border:0;
 border-radius:6px;
 background:var(--key);
 color:var(--text);
 font-size:18px;
 cursor:pointer;
 position:relative;
 display:flex;
 align-items:center;
 justify-content:center;
 padding-top:8px;
 box-shadow:0 2px 0 var(--shadow);
 user-select:none;
}
.key::before{
 content:attr(data-badge);
 position:absolute;
 top:3px;
 left:5px;
 font-size:11px;
 color:#9ca3af;
 font-family:Arial,sans-serif;
 pointer-events:none;
}
.key:active{
 transform:translateY(2px);
 box-shadow:none;
}
.functional{
 background:#acb3bc;
 font-size:15px;
 padding:0;
}
.functional::before{display:none}
.big{flex:1.8;max-width:120px}
.space{flex:4;max-width:600px}

@media(max-width:600px){
 .key{
  height:44px;
  font-size:15px;
 }
}
</style>
</head>
<body>

<div class="input-container">
<textarea id="main-input" placeholder="点击下方虚拟键盘开始输入内容..."></textarea>
</div>

<div class="keyboard-container">
<div class="keyboard-wrapper"></div>
</div>

<script>
const rows=[
"1 2 3 4 5 6 7 8 9 0 ↑ ↓ ♢",
"ñ w e r t y u i o p rr",
"a s d f g h j k l tt pp",
"z x c v b n m ö ü kk",
"< ' SPACE \" > ENTER"
];

const wrapper=document.querySelector(".keyboard-wrapper");
const input=document.querySelector("#main-input");

rows.forEach(row=>{
 const div=document.createElement("div");
 div.className="keyboard-row";

 row.split(" ").forEach(k=>{
  const btn=document.createElement("button");
  btn.className="key";

  if(k==="SPACE"){
   btn.textContent="space";
   btn.dataset.action="space";
   btn.classList.add("functional","space");
  }else if(k==="ENTER"){
   btn.textContent="enter";
   btn.dataset.action="enter";
   btn.classList.add("functional","big");
  }else{
   btn.textContent=k;
   btn.dataset.value=k;
   btn.dataset.badge=k;
  }

  if(k==="kk"){
   btn.dataset.value="kk";
  }

  div.appendChild(btn);
 });
 wrapper.appendChild(div);
});

const back=document.createElement("button");
back.className="key functional big";
back.textContent="Backspace";
back.dataset.action="backspace";
wrapper.children[3].appendChild(back);


function insertText(text){
 const s=input.selectionStart;
 const e=input.selectionEnd;
 input.setRangeText(text,s,e,"end");
 input.focus();
}

function backspace(){
 const s=input.selectionStart;
 const e=input.selectionEnd;

 if(s!==e){
  input.setRangeText("",s,e,"start");
 }else if(s>0){
  input.setRangeText("",s-1,s,"start");
 }
 input.focus();
}

wrapper.addEventListener("pointerdown",e=>{
 const key=e.target.closest(".key");
 if(!key)return;

 e.preventDefault();

 const action=key.dataset.action;
 const value=key.dataset.value;

 if(value) insertText(value);
 if(action==="space") insertText(" ");
 if(action==="enter") insertText("\n");
 if(action==="backspace") backspace();
});

input.value=localStorage.getItem("ikar_text")||"";
input.addEventListener("input",()=>{
 localStorage.setItem("ikar_text",input.value);
});

input.focus();
</script>
</body>
</html>
